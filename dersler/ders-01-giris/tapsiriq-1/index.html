<!DOCTYPE html>
<html>

<head>
    <title>CSS Dərs 1 - Tapsiriq 1 </title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f4f4f4;
            padding: 20px;
        }

        h1 {
            color: darkblue;
            font-size: 42px;
        }

        h2 {
            color: purple;
            font-size: 30px;
        }

        h3 {
            color: darkred;
            font-size: 24px;
        }

        p {
            color: #333;
            font-size: 18px;
        }

        div {
            background-color: lightyellow;
            width: 500px;
            height: 180px;
            padding: 20px;
            border: 3px solid orange;
        }

        ul {
            background-color: white;
            width: 300px;
            padding: 20px;
            border: 2px solid gray;
        }

        li {
            font-size: 18px;
            color: green;
        }

        button {
            background-color: green;
            color: white;
            font-size: 18px;
            width: 150px;
            height: 50px;
            border: 2px solid black;
        }

      
    </style>
</head>

<body>

    <h1>Dünya xəbərləri</h1>

    <h2>Biz CSS öyrənirik</h2>

    <p>
        CSS çox maraqlı, əyləncəli, rahat dildir. Kodları sadəcə əzbərlmək lazımdır
    </p>

    <p>
        İstəsən hər şey mümkündür
    </p>

    <div>
        <h3>Haqqımızda</h3>
        <p>
           Burda bir div yaranıb içində padding, border, background-color var
        </p>
    </div>

    <ul>
        <li>HTML öyrənirik</li>
        <li>CSS öyrənirik</li>
        <li>Veb sayt hazırlayırıq</li>
    </ul>

    <button>Ətraflı Oxu</button>


</body>

</html>

<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Musiqiçi Profili Layihəsi</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #121214; /* HEX rəng kodu */
        }
    </style>
</head>
<body>

    <div id="profile-card">
        
        <div class="profile-header">
            <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png" style="width: 100px; height: 100px; background-color: #ff5722; margin: 0px auto 15px auto; border-radius: 50%;" />
            
            <h1>[Sənin adın]</h1>
            <p class="subtitle">[İş sahən]</p>
        </div>

        <hr>

        <div class="profile-bio">
            <h3>Bioqrafiya</h3>
            <p class="bio-text">
                Özün haqqında məlumat yaz
            </p>
        </div>

        <div class="profile-links">
            <h3>Rəsmi Linklər</h3>
            
            <a href="https://spotify.com" class="music-link" id="spotify-btn">Link 1</a>
            <a href="https://soundcloud.com" class="music-link" id="soundcloud-btn">Link 2</a>
        </div>
        
        <div class="track-section">
            <h3>Başlıq</h3>
            <p class="track-name">Burda mesaj yaz</p>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Profil Kartı</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

    <style>

        body {
            background-color: #f2f2f2;
            font-family: "Poppins", sans-serif;
        }

        .card {
            width: 500px;
            margin: 30px auto;
            background-color: white;
            border: 1px solid #ddd;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px gray;
        }

        .job {
            text-align: center;
            font-style: italic;
            color: rgb(120, 120, 120);
        }

        .about {
            text-indent: 30px;
            line-height: 1.8;
            word-spacing: 5px;
            text-align: justify;
        }

        .skills {
            font-weight: bold;
            font-size: 20px;
            color: #3498db;
        }

        a {
            text-decoration: none;
            color: red;
        }

        .long-text {
            width: 250px;
            border: 1px solid black;

            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

    </style>
</head>

<body>

    <div class="card">

        <h1>[Sənin adın]</h1>

        <p class="job">Full Stack Developer</p>

        <p class="about">
            Mən CSS öyrənirəm.
            Müxtəlif layihələr hazırlayıram və daim yeni texnologiyalar öyrənirəm.
        </p>

        <p class="skills">
            Bacarıqlar
        </p>

        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>React</li>
        </ul>

        <a href="#">
            GitHub Profilim
        </a>

        <br><br>

        <div class="long-text">
            Bu çox uzun mətndir və konteynerə sığmadığı üçün sonunda üç nöqtə görünəcək.
        </div>

    </div>

</body>
</html>
